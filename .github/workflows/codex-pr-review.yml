name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge

      - name: Pre-fetch base and head refs
        run: |
          git fetch --no-tags origin "${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags origin "${{ github.event.pull_request.head.ref }}"

      - name: Run Codex review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this pull request.
            Focus on:
            1) Correctness and possible bugs
            2) Security concerns
            3) Breaking changes and compatibility risks
            4) Test gaps
            Return concise markdown with:
            - Summary
            - Major Issues
            - Minor Issues
            - Suggestions

      - name: Post review comment
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW: ${{ steps.run_codex.outputs.final-message }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = process.env.CODEX_REVIEW?.trim()
              ? `## Codex Review\n\n${process.env.CODEX_REVIEW}`
              : '## Codex Review\n\nNo review output was generated.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
